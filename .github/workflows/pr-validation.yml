name: PR Validation

on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'

# Cancel an in-flight run when a new push lands on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    # GitHub-hosted — the build is just two small Go binaries + a unit test,
    # no self-hosted runner needed (ubuntu-latest already ships make + gcc).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Verify dependencies
        run: go mod verify

      - name: Build (full-module compile)
        run: make build

      - name: Run unit tests (config/database create-only password diff)
        run: make test
